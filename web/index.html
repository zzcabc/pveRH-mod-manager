<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物大战僵尸融合版 Mod 管理器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        /* 行样式 */
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .row label {
            font-weight: bold;
            min-width: 80px;
        }

        .row select, .row button {
            padding: 8px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .row select {
            min-width: 200px;
            background: #fff;
        }

        .row button {
            cursor: pointer;
            white-space: nowrap;
        }

        .row .info {
            padding: 8px 12px;
            background: #f5f5f5;
            border-radius: 4px;
        }

        /* 按钮样式 */
        .btn-primary {
            background: #1677ff;
            color: #fff;
            border-color: #1677ff;
        }

        .btn-primary:hover {
            background: #4096ff;
        }

        .btn-success {
            background: #52c41a;
            color: #fff;
            border-color: #52c41a;
        }

        .btn-success:hover {
            background: #73d13d;
        }

        .btn-danger {
            background: #ff4d4f;
            color: #fff;
            border-color: #ff4d4f;
        }

        .btn-danger:hover {
            background: #ff7875;
        }

        .btn-warning {
            background: #faad14;
            color: #fff;
            border-color: #faad14;
        }

        .btn-warning:hover {
            background: #ffc53d;
        }

        .btn-default {
            background: #fff;
            color: #333;
        }

        .btn-default:hover {
            background: #f5f5f5;
        }

        .btn-disabled {
            background: #d9d9d9;
            color: #999;
            cursor: not-allowed;
            border-color: #d9d9d9;
        }

        /* 状态标签 */
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        .status-installed {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }

        .status-not-installed {
            background: #fff7e6;
            color: #faad14;
            border: 1px solid #ffd591;
        }

        /* MOD 列表区域 */
        .mod-section {
            margin-bottom: 16px;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            overflow: hidden;
        }

        .mod-section-title {
            padding: 10px 16px;
            background: #fafafa;
            font-weight: bold;
            border-bottom: 1px solid #e8e8e8;
        }

        .mod-split {
            display: flex;
            min-height: 200px;
            align-items: stretch;
        }

        .mod-half {
            flex: 1 1 50%;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .mod-half:first-child {
            border-right: 1px solid #e8e8e8;
        }

        .mod-half-header {
            padding: 8px 12px;
            background: #f5f5f5;
            font-size: 13px;
            color: #666;
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
        }

        .mod-half-content {
            padding: 8px;
            flex: 1 1 auto;
            overflow-y: auto;
            max-height: 400px;
        }

        /* MOD 项 */
        .mod-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px solid #f0f0f0;
        }

        .mod-item:last-child {
            border-bottom: none;
        }

        .mod-item:hover {
            background: #f5f5f5;
        }

        .mod-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 8px;
        }

        .mod-name small {
            color: #999;
            font-size: 12px;
        }

        .mod-actions {
            display: flex;
            gap: 4px;
        }

        /* 功能按钮行 */
        .action-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* 搜索框 */
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
        }

        /* 在线 MOD 样式 */
        .online-tabs {
            display: flex;
            gap: 0;
            padding: 0 16px;
            border-bottom: 1px solid #e8e8e8;
            background: #fafafa;
        }

        .online-tab {
            padding: 8px 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .online-tab:hover {
            color: #1677ff;
        }

        .online-tab.active {
            color: #1677ff;
            border-bottom-color: #1677ff;
            font-weight: bold;
        }

        .online-mod-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            padding: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .online-mod-card {
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 12px;
            background: #fff;
            transition: box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .online-mod-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .online-mod-card .omod-author {
            display: inline-block;
            font-size: 11px;
            color: #1677ff;
            background: #e6f4ff;
            padding: 2px 8px;
            border-radius: 10px;
            align-self: flex-start;
        }

        .online-mod-card .omod-name {
            font-size: 15px;
            font-weight: bold;
            color: #333;
        }

        .online-mod-card .omod-eng {
            font-size: 12px;
            color: #999;
        }

        .online-mod-card .omod-file {
            font-size: 11px;
            color: #bbb;
            font-family: monospace;
        }

        .online-mod-card .omod-actions {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 4px;
        }

        .btn-download {
            padding: 4px 12px;
            font-size: 12px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-download:hover {
            background: #4096ff;
        }

        .btn-download:disabled {
            background: #d9d9d9;
            color: #999;
            cursor: not-allowed;
        }

        .btn-download.downloading {
            background: #faad14;
        }

        .btn-download.done {
            background: #52c41a;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .row {
                flex-direction: column;
                align-items: flex-start;
            }

            .row label {
                min-width: auto;
                margin-bottom: 4px;
            }

            .mod-split {
                flex-direction: column;
            }

            .mod-half {
                flex: 1 1 auto;
            }

            .mod-half:first-child {
                border-right: none;
                border-bottom: 1px solid #e8e8e8;
            }

            .mod-half-content {
                max-height: 250px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>植物大战僵尸融合版 Mod 管理器</h1>

    <!-- 第一行：游戏目录和版本选择 -->
    <div class="row">
        <label>游戏目录：</label>
        <select id="gamePathSelect" onchange="onGamePathChange()">
            <option value="">请选择...</option>
        </select>
        <button class="btn-default" onclick="addGamePath()">添加</button>
        <label style="min-width: 50px;">版本：</label>
        <select id="versionSelect" onchange="onVersionChange()">
            <option value="">请选择...</option>
        </select>
    </div>

    <!-- 第二行：MOD 目录选择 -->
    <div class="row">
        <label>MOD目录：</label>
        <select id="modPathSelect" onchange="onModPathChange()">
            <option value="">请选择...</option>
        </select>
        <button class="btn-default" onclick="addModPath()">添加</button>
    </div>

    <!-- 第三行：BepInEx 检测 -->
    <div class="row">
        <label>BepInEx：</label>
        <span id="bepStatus" class="status-tag status-not-installed">检测中...</span>
        <button id="installBepBtn" class="btn-success" onclick="installBepInEx()" style="display:none;">安装 BepInEx
        </button>
        <button id="removeBepBtn" class="btn-danger" onclick="removeBepInEx()" style="display:none;">卸载 BepInEx
        </button>
    </div>

    <!-- 第四行：修改器安装 -->
    <div class="row">
        <label>修改器：</label>
        <button class="btn-disabled" disabled title="功能开发中">安装高数修改器</button>
        <button class="btn-disabled" disabled title="功能开发中">安装梧萱修改器</button>
    </div>

    <!-- 第五行：打开目录 -->
    <div class="row">
        <label>快捷操作：</label>
        <button class="btn-default" onclick="openFolder('game')">打开游戏目录</button>
        <button class="btn-default" onclick="openFolder('mod')">打开MOD目录</button>
        <button class="btn-default" onclick="openFolder('installed')">打开已安装MOD目录</button>
    </div>

    <!-- 搜索框 -->
    <div class="row">
        <label>搜索：</label>
        <input type="text" class="search-input" id="searchInput" placeholder="输入中文名称关键字..."
               oninput="onSearch()">
        <button class="btn-default" onclick="clearSearch()">清除</button>
        <button class="btn-primary" onclick="refreshAll()">刷新列表</button>
    </div>

    <!-- 作者筛选 -->
    <div class="row" id="authorFilterRow" style="display:none;">
        <label>作者：</label>
        <div id="authorCheckboxes" style="display:flex;flex-wrap:wrap;gap:4px;"></div>
    </div>

    <!-- 第六行：植物 MOD -->
    <div class="mod-section">
        <div class="mod-section-title">🌱 植物 MOD</div>
        <div class="mod-split">
            <div class="mod-half">
                <div class="mod-half-header">未安装</div>
                <div class="mod-half-content" id="plantNotInstalled"></div>
            </div>
            <div class="mod-half">
                <div class="mod-half-header">已安装</div>
                <div class="mod-half-content" id="plantInstalled"></div>
            </div>
        </div>
    </div>

    <!-- 第七行：僵尸 MOD -->
    <div class="mod-section">
        <div class="mod-section-title">🧟 僵尸 MOD</div>
        <div class="mod-split">
            <div class="mod-half">
                <div class="mod-half-header">未安装</div>
                <div class="mod-half-content" id="zombieNotInstalled"></div>
            </div>
            <div class="mod-half">
                <div class="mod-half-header">已安装</div>
                <div class="mod-half-content" id="zombieInstalled"></div>
            </div>
        </div>
    </div>

    <!-- 第八行：皮肤 -->
    <div class="mod-section">
        <div class="mod-section-title">🎨 皮肤</div>
        <div class="mod-split">
            <div class="mod-half">
                <div class="mod-half-header">未安装</div>
                <div class="mod-half-content" id="skinNotInstalled"></div>
            </div>
            <div class="mod-half">
                <div class="mod-half-header">已安装</div>
                <div class="mod-half-content" id="skinInstalled"></div>
            </div>
        </div>
    </div>

    <!-- 第九行：在线 MOD -->
    <div class="mod-section">
        <div class="mod-section-title">🌐 在线 MOD <span style="font-weight:normal;font-size:12px;color:#999;margin-left:8px;" id="serverUrlDisplay"></span></div>
        <div id="onlineConfigHint" style="padding:12px 16px;background:#fff7e6;border-bottom:1px solid #ffd591;display:none;">
            ⚠️ 未配置服务器地址，请前往 <a href="/admin.html" target="_blank">配置管理</a> 设置服务器地址
        </div>
        <div id="onlineMain" style="display:none;">
            <div style="display:flex;align-items:center;padding:8px 16px;gap:10px;border-bottom:1px solid #e8e8e8;">
                <label style="font-weight:bold;white-space:nowrap;">版本：</label>
                <select id="onlineVersionSelect" onchange="onOnlineVersionChange()" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;min-width:150px;">
                    <option value="">加载中...</option>
                </select>
                <button class="btn-default" onclick="loadOnlineMods()" style="padding:6px 12px;font-size:12px;">🔄 刷新</button>
            </div>
            <div class="online-tabs" id="onlineTabs">
                <button class="online-tab active" data-cat="all" onclick="filterOnlineMods('all', this)">全部</button>
                <button class="online-tab" data-cat="plant" onclick="filterOnlineMods('plant', this)">🌱 植物</button>
                <button class="online-tab" data-cat="zombie" onclick="filterOnlineMods('zombie', this)">🧟 僵尸</button>
                <button class="online-tab" data-cat="skin" onclick="filterOnlineMods('skin', this)">🎨 皮肤</button>
                <button class="online-tab" data-cat="plugin" onclick="filterOnlineMods('plugin', this)">🔌 插件</button>
                <button class="online-tab" data-cat="other" onclick="filterOnlineMods('other', this)">📦 其他</button>
            </div>
            <div class="online-mod-list" id="onlineModList">
                <div style="text-align:center;padding:40px;color:#999;">请选择版本后加载 Mod 列表</div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentConfig = null;
    let currentKeyword = '';
    let selectedAuthors = {};  // author -> true/false
    let allModData = {
        plantMods: {installed: [], not_installed: []},
        zombieMods: {installed: [], not_installed: []},
        skins: {installed: [], not_installed: []}
    };

    // 页面初始化
    window.addEventListener('DOMContentLoaded', () => {
        loadConfig();
    });

    // 加载配置
    function loadConfig() {
        fetch('/api/config')
            .then(res => res.json())
            .then(cfg => {
                currentConfig = cfg;
                updateGamePathSelect(cfg.game_paths || []);
                updateModPathSelect(cfg.mod_paths || []);
                updateVersionSelect(cfg.versions || []);

                if (cfg.current_game) {
                    document.getElementById('gamePathSelect').value = cfg.current_game;
                    checkBepInEx();
                    loadMods();
                    loadSkins();
                }
                if (cfg.current_version) {
                    document.getElementById('versionSelect').value = cfg.current_version;
                }
                if (cfg.current_modlib) {
                    document.getElementById('modPathSelect').value = cfg.current_modlib;
                }

                initOnlineMod(cfg);
            })
            .catch(err => console.error('加载配置失败:', err));
    }

    // 更新游戏目录下拉框
    function updateGamePathSelect(paths) {
        const select = document.getElementById('gamePathSelect');
        select.innerHTML = '<option value="">请选择...</option>';
        paths.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.path;
            opt.textContent = `${p.path} (${p.version || '未知版本'})`;
            select.appendChild(opt);
        });
    }

    // 更新 MOD 目录下拉框
    function updateModPathSelect(paths) {
        const select = document.getElementById('modPathSelect');
        select.innerHTML = '<option value="">请选择...</option>';
        paths.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            select.appendChild(opt);
        });
    }

    // 更新版本下拉框
    function updateVersionSelect(versions) {
        const select = document.getElementById('versionSelect');
        select.innerHTML = '<option value="">请选择...</option>';
        versions.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v;
            opt.textContent = v;
            select.appendChild(opt);
        });
    }

    // 游戏目录切换
    function onGamePathChange() {
        const path = document.getElementById('gamePathSelect').value;
        if (!path) return;

        fetch('/api/switch-game', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({path: path})
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('切换失败: ' + data.error);
                } else {
                    // 同步版本下拉框
                    if (data.version) {
                        document.getElementById('versionSelect').value = data.version;
                    }
                    checkBepInEx();
                    loadMods();
                    loadSkins();
                    syncOnlineVersion();
                }
            })
            .catch(err => alert('切换失败: ' + err.message));
    }

    // 版本切换
    function onVersionChange() {
        const version = document.getElementById('versionSelect').value;
        if (!version) return;

        fetch('/api/switch-version', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({version: version})
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('切换失败: ' + data.error);
                } else {
                    document.getElementById('gamePathSelect').value = data.game_path;
                    checkBepInEx();
                    loadMods();
                    loadSkins();
                    syncOnlineVersion();
                }
            })
            .catch(err => alert('切换失败: ' + err.message));
    }

    // 将在线的版本选择器同步为当前游戏版本
    function syncOnlineVersion() {
        const onlineVer = document.getElementById('onlineVersionSelect');
        const gameVer = document.getElementById('versionSelect').value;
        if (gameVer && onlineVer) {
            // 如果在线版本下拉框中有对应版本，自动选中
            for (let i = 0; i < onlineVer.options.length; i++) {
                if (onlineVer.options[i].value === gameVer) {
                    onlineVer.value = gameVer;
                    loadOnlineMods();
                    return;
                }
            }
        }
    }

    // MOD 目录切换
    function onModPathChange() {
        fetch('/api/add-mod-path', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.path) {
                    loadConfig();
                }
            })
            .catch(err => alert('添加失败: ' + err.message));
    }

    // 添加游戏目录
    function addGamePath() {
        fetch('/api/add-game-path', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.path) {
                    loadConfig();
                }
            })
            .catch(err => alert('添加失败: ' + err.message));
    }

    // 添加 MOD 目录
    function addModPath() {
        fetch('/api/add-mod-path', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.path) {
                    loadConfig();
                }
            })
            .catch(err => alert('添加失败: ' + err.message));
    }

    // 检查 BepInEx 状态
    function checkBepInEx() {
        fetch('/api/check-bepinex')
            .then(res => res.json())
            .then(data => {
                const statusEl = document.getElementById('bepStatus');
                const installBtn = document.getElementById('installBepBtn');
                const removeBtn = document.getElementById('removeBepBtn');

                if (data.installed) {
                    statusEl.textContent = '已安装';
                    statusEl.className = 'status-tag status-installed';
                    installBtn.style.display = 'none';
                    removeBtn.style.display = 'inline-block';
                } else {
                    statusEl.textContent = '未安装';
                    statusEl.className = 'status-tag status-not-installed';
                    installBtn.style.display = 'inline-block';
                    removeBtn.style.display = 'none';
                }
            })
            .catch(err => console.error('检查 BepInEx 失败:', err));
    }

    // 安装 BepInEx
    function installBepInEx() {
        if (!confirm('确定要安装 BepInEx 吗？')) return;

        const btn = document.getElementById('installBepBtn');
        btn.disabled = true;
        btn.textContent = '安装中...';

        fetch('/api/install-bepinex', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('安装失败: ' + data.error);
                } else {
                    alert('BepInEx 安装完成！');
                    checkBepInEx();
                    loadMods();
                }
            })
            .catch(err => alert('安装失败: ' + err.message))
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '安装 BepInEx';
            });
    }

    // 卸载 BepInEx
    function removeBepInEx() {
        if (!confirm('确定要卸载 BepInEx 吗？\n这将删除 BepInEx 相关文件，但保留游戏原始文件。')) return;

        const btn = document.getElementById('removeBepBtn');
        btn.disabled = true;
        btn.textContent = '卸载中...';

        fetch('/api/remove-bepinex', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('卸载失败: ' + data.error);
                } else {
                    alert('BepInEx 已卸载！');
                    checkBepInEx();
                    loadMods();
                }
            })
            .catch(err => alert('卸载失败: ' + err.message))
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '卸载 BepInEx';
            });
    }

    // 打开目录
    function openFolder(type) {
        if (type === 'installed') {
            // 打开已安装MOD目录前，先检查 BepInEx 是否已安装
            fetch('/api/check-bepinex')
                .then(res => res.json())
                .then(data => {
                    if (!data.installed) {
                        alert('BepInEx 未安装，无法打开已安装MOD目录。\n请先安装 BepInEx。');
                        return;
                    }
                    doOpenFolder(type);
                })
                .catch(err => alert('检查 BepInEx 失败: ' + err.message));
            return;
        }
        doOpenFolder(type);
    }

    function doOpenFolder(type) {
        fetch(`/api/open-folder`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({type: type})
        })
            .catch(err => alert('打开目录失败: ' + err.message));
    }

    // 刷新所有列表
    function refreshAll() {
        loadConfig();
        loadMods();
        loadSkins();
    }

    // 搜索
    function onSearch() {
        currentKeyword = document.getElementById('searchInput').value;
        renderAllMods();
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        currentKeyword = '';
        renderAllMods();
    }

    // 加载 MOD 列表
    function loadMods() {
        fetch('/api/mods')
            .then(res => res.json())
            .then(data => {
                allModData = {
                    plantMods: data.plant_mods || {installed: [], not_installed: []},
                    zombieMods: data.zombie_mods || {installed: [], not_installed: []},
                    skins: data.skins || {installed: [], not_installed: []}
                };
                renderAllMods();
                updateAuthorFilter();
            })
            .catch(err => console.error('加载 MOD 列表失败:', err));
    }

    // ========== 皮肤 ==========

    function loadSkins() {
        fetch('/api/skins')
            .then(res => res.json())
            .then(data => {
                renderSkinList('skinNotInstalled', data.not_installed || [], false);
                renderSkinList('skinInstalled', data.installed || [], true);
            })
            .catch(err => console.error('加载皮肤失败:', err));
    }

    function renderSkinList(containerId, skins, isInstalled) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';

        if (!skins || skins.length === 0) {
            container.innerHTML = '<div class="mod-item"><span class="mod-name" style="color:#999;">无</span></div>';
            return;
        }

        skins.forEach(skin => {
            const div = document.createElement('div');
            div.className = 'mod-item';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'mod-name';
            const displayName = skin.chinese_name || skin.name || '';
            nameSpan.textContent = (isInstalled ? '✅ ' : '') + displayName;

            div.appendChild(nameSpan);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'mod-actions';

            if (isInstalled) {
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '移除';
                removeBtn.className = 'btn-danger';
                removeBtn.style.padding = '4px 8px';
                removeBtn.style.fontSize = '12px';
                removeBtn.onclick = () => removeSkin(skin.name);
                actionsDiv.appendChild(removeBtn);
            } else {
                const installBtn = document.createElement('button');
                installBtn.textContent = '安装';
                installBtn.className = 'btn-success';
                installBtn.style.padding = '4px 8px';
                installBtn.style.fontSize = '12px';
                installBtn.onclick = () => installSkin(skin.name);
                actionsDiv.appendChild(installBtn);
            }

            div.appendChild(actionsDiv);
            container.appendChild(div);
        });
    }

    function installSkin(name) {
        fetch('/api/install-skin', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name})
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('安装失败: ' + data.error);
                } else {
                    loadSkins();
                }
            })
            .catch(err => alert('安装失败: ' + err.message));
    }

    function removeSkin(name) {
        if (!confirm('确定要移除该皮肤吗？')) return;

        fetch('/api/remove-skin', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name})
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('移除失败: ' + data.error);
                } else {
                    loadSkins();
                }
            })
            .catch(err => alert('移除失败: ' + err.message));
    }

    // ========== 作者筛选 ==========

    function updateAuthorFilter() {
        const authors = {};
        // 从所有已加载数据中收集作者
        ['plantMods', 'zombieMods'].forEach(cat => {
            ['installed', 'not_installed'].forEach(st => {
                (allModData[cat][st] || []).forEach(m => {
                    const a = m.author;
                    if (a && !authors[a]) {
                        authors[a] = selectedAuthors[a] !== false; // 默认选中
                    }
                });
            });
        });

        const container = document.getElementById('authorCheckboxes');
        const row = document.getElementById('authorFilterRow');
        const authorList = Object.keys(authors).sort();

        if (authorList.length <= 1) {
            row.style.display = 'none';
            return;
        }

        row.style.display = 'flex';
        container.innerHTML = '';

        // "全部" toggle
        const allBtn = document.createElement('button');
        const allSelected = authorList.every(a => selectedAuthors[a] !== false);
        allBtn.textContent = allSelected ? '✓ 全部' : '☐ 全部';
        allBtn.style.cssText = 'padding:3px 10px;font-size:12px;border:1px solid #d9d9d9;border-radius:12px;cursor:pointer;background:' + (allSelected ? '#1677ff' : '#fff') + ';color:' + (allSelected ? '#fff' : '#333');
        allBtn.onclick = function() {
            const newVal = !allSelected;
            authorList.forEach(a => { selectedAuthors[a] = newVal; });
            updateAuthorFilter();
            renderAllMods();
        };
        container.appendChild(allBtn);

        authorList.forEach(author => {
            const sel = selectedAuthors[author] !== false;
            const btn = document.createElement('button');
            btn.textContent = (sel ? '✓ ' : '') + author;
            btn.style.cssText = 'padding:3px 10px;font-size:12px;border:1px solid ' + (sel ? '#1677ff' : '#d9d9d9') + ';border-radius:12px;cursor:pointer;background:' + (sel ? '#e6f4ff' : '#fff') + ';color:' + (sel ? '#1677ff' : '#333');
            btn.onclick = function() {
                selectedAuthors[author] = !sel;
                updateAuthorFilter();
                renderAllMods();
            };
            container.appendChild(btn);
        });
    }

    function toggleAuthor(author) {
        selectedAuthors[author] = !selectedAuthors[author];
        renderAllMods();
    }

    function authorMatch(mod) {
        // 检查是否所有选中的作者都被筛选掉了
        const activeAuthors = Object.keys(selectedAuthors).filter(a => selectedAuthors[a] !== false);
        if (activeAuthors.length === 0) return true;
        if (activeAuthors.length === Object.keys(selectedAuthors).length) return true; // 全部选中
        return activeAuthors.includes(mod.author);
    }

    // 渲染所有 MOD 列表
    function renderAllMods() {
        const keyword = currentKeyword.trim().toLowerCase();
        const matchText = (text) => !keyword || (text && text.toLowerCase().includes(keyword));

        const plantNI = allModData.plantMods.not_installed.filter(m => matchText(m.name) && authorMatch(m));
        const plantI = allModData.plantMods.installed.filter(m => matchText(m.chinese_name) && authorMatch(m));
        const zombieNI = allModData.zombieMods.not_installed.filter(m => matchText(m.name) && authorMatch(m));
        const zombieI = allModData.zombieMods.installed.filter(m => matchText(m.chinese_name) && authorMatch(m));

        renderModList('plantNotInstalled', plantNI, false);
        renderModList('plantInstalled', plantI, true);
        renderModList('zombieNotInstalled', zombieNI, false);
        renderModList('zombieInstalled', zombieI, true);
    }

    // 渲染 MOD 列表
    function renderModList(containerId, mods, isInstalled) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';

        if (!mods || mods.length === 0) {
            container.innerHTML = '<div class="mod-item"><span class="mod-name" style="color:#999;">无</span></div>';
            return;
        }

        mods.forEach(mod => {
            const div = document.createElement('div');
            div.className = 'mod-item';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'mod-name';

            if (isInstalled) {
                const statusIcon = mod.enabled !== false ? '✅' : '⏸️';
                nameSpan.textContent = `${statusIcon} ${mod.chinese_name}`;
                if (mod.dll_names && mod.dll_names.length > 0) {
                    const small = document.createElement('small');
                    small.textContent = ` (${mod.dll_names.join(', ')})`;
                    nameSpan.appendChild(small);
                }
            } else {
                nameSpan.textContent = mod.name;
                if (mod.dll_names && mod.dll_names.length > 0) {
                    const small = document.createElement('small');
                    small.textContent = ` (${mod.dll_names.join(', ')})`;
                    nameSpan.appendChild(small);
                }
            }

            div.appendChild(nameSpan);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'mod-actions';

            if (isInstalled) {
                // 已安装：显示移除按钮
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '移除';
                removeBtn.className = 'btn-danger';
                removeBtn.style.padding = '4px 8px';
                removeBtn.style.fontSize = '12px';
                removeBtn.onclick = () => removeMod(mod.chinese_name);
                actionsDiv.appendChild(removeBtn);
            } else {
                // 未安装：显示安装按钮
                const installBtn = document.createElement('button');
                installBtn.textContent = '安装';
                installBtn.className = 'btn-success';
                installBtn.style.padding = '4px 8px';
                installBtn.style.fontSize = '12px';
                installBtn.onclick = () => installMod(mod.name);
                actionsDiv.appendChild(installBtn);
            }

            div.appendChild(actionsDiv);
            container.appendChild(div);
        });
    }

    // 安装 MOD
    function installMod(name) {
        fetch('/api/install-mod', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name})
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('安装失败: ' + data.error);
                } else {
                    loadMods();
                }
            })
            .catch(err => alert('安装失败: ' + err.message));
    }

    // 移除 MOD
    function removeMod(name) {
        if (!confirm(`确定要移除 "${name}" 吗？`)) return;

        fetch('/api/remove-mod-by-name', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name})
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('移除失败: ' + data.error);
                } else {
                    loadMods();
                }
            })
            .catch(err => alert('移除失败: ' + err.message));
    }

    // ========== 在线 MOD ==========

    let onlineAllMods = [];
    let onlineCurrentCat = 'all';
    let downloadingMods = {};  // fileName -> true

    function initOnlineMod(cfg) {
        document.getElementById('onlineConfigHint').style.display = 'none';
        document.getElementById('onlineMain').style.display = 'block';
        document.getElementById('serverUrlDisplay').textContent = cfg.server_url ? '(' + cfg.server_url + ')' : '';
        loadOnlineVersions();
    }

    function loadOnlineVersions() {
        fetch('/api/online/versions')
            .then(res => res.json())
            .then(versions => {
                var select = document.getElementById('onlineVersionSelect');
                select.innerHTML = '<option value="">请选择版本...</option>';
                if (Array.isArray(versions)) {
                    versions.forEach(function(v) {
                        var opt = document.createElement('option');
                        opt.value = v;
                        opt.textContent = 'v' + v;
                        select.appendChild(opt);
                    });
                }
            })
            .catch(function(err) {
                console.error('加载在线版本失败:', err);
                var select = document.getElementById('onlineVersionSelect');
                select.innerHTML = '<option value="">加载失败，请检查服务器</option>';
            });
    }

    function onOnlineVersionChange() {
        loadOnlineMods();
    }

    function loadOnlineMods() {
        var ver = document.getElementById('onlineVersionSelect').value;
        if (!ver) {
            onlineAllMods = [];
            renderOnlineMods();
            return;
        }

        var list = document.getElementById('onlineModList');
        list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">加载中...</div>';

        fetch('/api/online/mods?ver=' + encodeURIComponent(ver))
            .then(res => res.json())
            .then(function(mods) {
                if (!Array.isArray(mods)) {
                    onlineAllMods = [];
                } else {
                    onlineAllMods = mods;
                }
                renderOnlineMods();
            })
            .catch(function(err) {
                console.error('加载在线 MOD 失败:', err);
                onlineAllMods = [];
                renderOnlineMods();
                document.getElementById('onlineModList').innerHTML =
                    '<div style="text-align:center;padding:40px;color:#ff4d4f;">加载失败: ' + err.message + '</div>';
            });
    }

    function filterOnlineMods(cat, btn) {
        onlineCurrentCat = cat;
        // 更新 tab 样式
        document.querySelectorAll('.online-tab').forEach(function(t) {
            t.classList.remove('active');
        });
        if (btn) btn.classList.add('active');
        renderOnlineMods();
    }

    // 将服务器返回的 mod_type 归一化到 frontend 分类 key
    function normalizeModType(raw) {
        if (!raw) return 'other';
        var t = raw.trim();
        // 中文值
        if (t === '植物' || t === '植物MOD') return 'plant';
        if (t === '僵尸' || t === '僵尸MOD') return 'zombie';
        if (t === '皮肤') return 'skin';
        if (t === '插件' || t === '插件MOD' || t === '修改器') return 'plugin';
        if (t === '其他' || t === '宠物MOD') return 'other';
        // 英文值（大小写不敏感）
        var lower = t.toLowerCase();
        if (lower === 'plant') return 'plant';
        if (lower === 'zombie') return 'zombie';
        if (lower === 'skin') return 'skin';
        if (lower === 'plugin' || lower === 'tool' || lower === 'trainer') return 'plugin';
        // 兜底
        return 'other';
    }

    function renderOnlineMods() {
        var list = document.getElementById('onlineModList');
        var filtered = onlineAllMods;

        // 分类过滤
        if (onlineCurrentCat !== 'all') {
            filtered = onlineAllMods.filter(function(m) {
                return normalizeModType(m.mod_type) === onlineCurrentCat;
            });
        }

        if (filtered.length === 0) {
            list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无 Mod</div>';
            return;
        }

        list.innerHTML = '';
        filtered.forEach(function(mod) {
            var card = document.createElement('div');
            card.className = 'online-mod-card';

            var author = document.createElement('span');
            author.className = 'omod-author';
            author.textContent = mod.author || '未知作者';

            var nameCn = document.createElement('div');
            nameCn.className = 'omod-name';
            nameCn.textContent = mod.name_cn || mod.name_en || '未知';

            var nameEn = document.createElement('div');
            nameEn.className = 'omod-eng';
            nameEn.textContent = mod.name_en || '';

            var fileInfo = document.createElement('div');
            fileInfo.className = 'omod-file';
            fileInfo.textContent = mod.file_name || '';

            var actions = document.createElement('div');
            actions.className = 'omod-actions';

            var downloadBtn = document.createElement('button');
            var btnKey = mod.file_name;
            if (downloadingMods[btnKey]) {
                downloadBtn.textContent = '下载中...';
                downloadBtn.className = 'btn-download downloading';
                downloadBtn.disabled = true;
            } else {
                downloadBtn.textContent = '⬇ 下载';
                downloadBtn.className = 'btn-download';
                downloadBtn.onclick = function() {
                    downloadOnlineMod(mod, downloadBtn);
                };
            }
            actions.appendChild(downloadBtn);

            card.appendChild(author);
            card.appendChild(nameCn);
            if (mod.name_en) card.appendChild(nameEn);
            card.appendChild(fileInfo);
            card.appendChild(actions);
            list.appendChild(card);
        });
    }

    function downloadOnlineMod(mod, btn) {
        if (!confirm('确定要下载 "' + (mod.name_cn || mod.name_en) + '" 吗？')) return;

        var btnKey = mod.file_name;
        downloadingMods[btnKey] = true;
        btn.textContent = '下载中...';
        btn.className = 'btn-download downloading';
        btn.disabled = true;

        fetch('/api/online/download', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(mod)
        })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.error) {
                    alert('下载失败: ' + data.error);
                    downloadingMods[btnKey] = false;
                    btn.textContent = '⬇ 下载';
                    btn.className = 'btn-download';
                    btn.disabled = false;
                } else {
                    btn.textContent = '✅ 已下载';
                    btn.className = 'btn-download done';
                    // 3秒后恢复按钮状态
                    setTimeout(function() {
                        downloadingMods[btnKey] = false;
                        btn.textContent = '⬇ 下载';
                        btn.className = 'btn-download';
                        btn.disabled = false;
                    }, 3000);
                }
            })
            .catch(function(err) {
                alert('下载失败: ' + err.message);
                downloadingMods[btnKey] = false;
                btn.textContent = '⬇ 下载';
                btn.className = 'btn-download';
                btn.disabled = false;
            });
    }
</script>
