<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物大战僵尸融合版 Mod 管理器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        /* 行样式 */
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .row label {
            font-weight: bold;
            min-width: 80px;
        }

        .row select, .row button {
            padding: 8px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .row select {
            min-width: 200px;
            background: #fff;
        }

        .row button {
            cursor: pointer;
            white-space: nowrap;
        }

        .row .info {
            padding: 8px 12px;
            background: #f5f5f5;
            border-radius: 4px;
        }

        /* 按钮样式 */
        .btn-primary {
            background: #1677ff;
            color: #fff;
            border-color: #1677ff;
        }

        .btn-primary:hover {
            background: #4096ff;
        }

        .btn-success {
            background: #52c41a;
            color: #fff;
            border-color: #52c41a;
        }

        .btn-success:hover {
            background: #73d13d;
        }

        .btn-danger {
            background: #ff4d4f;
            color: #fff;
            border-color: #ff4d4f;
        }

        .btn-danger:hover {
            background: #ff7875;
        }

        .btn-warning {
            background: #faad14;
            color: #fff;
            border-color: #faad14;
        }

        .btn-warning:hover {
            background: #ffc53d;
        }

        .btn-default {
            background: #fff;
            color: #333;
        }

        .btn-default:hover {
            background: #f5f5f5;
        }

        .btn-disabled {
            background: #d9d9d9;
            color: #999;
            cursor: not-allowed;
            border-color: #d9d9d9;
        }

        /* 状态标签 */
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        .status-installed {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }

        .status-not-installed {
            background: #fff7e6;
            color: #faad14;
            border: 1px solid #ffd591;
        }

        /* MOD 列表区域 */
        .mod-section {
            margin-bottom: 16px;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            overflow: hidden;
        }

        .mod-section-title {
            padding: 10px 16px;
            background: #fafafa;
            font-weight: bold;
            border-bottom: 1px solid #e8e8e8;
        }

        .mod-split {
            display: flex;
            min-height: 200px;
        }

        .mod-half {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .mod-half:first-child {
            border-right: 1px solid #e8e8e8;
        }

        .mod-half-header {
            padding: 8px 12px;
            background: #f5f5f5;
            font-size: 13px;
            color: #666;
            border-bottom: 1px solid #e8e8e8;
        }

        .mod-half-content {
            padding: 8px;
            flex: 1;
            overflow-y: auto;
            max-height: 300px;
        }

        /* MOD 项 */
        .mod-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px solid #f0f0f0;
        }

        .mod-item:last-child {
            border-bottom: none;
        }

        .mod-item:hover {
            background: #f5f5f5;
        }

        .mod-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 8px;
        }

        .mod-name small {
            color: #999;
            font-size: 12px;
        }

        .mod-actions {
            display: flex;
            gap: 4px;
        }

        /* 功能按钮行 */
        .action-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* 搜索框 */
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .row {
                flex-direction: column;
                align-items: flex-start;
            }

            .row label {
                min-width: auto;
                margin-bottom: 4px;
            }

            .mod-split {
                flex-direction: column;
            }

            .mod-half:first-child {
                border-right: none;
                border-bottom: 1px solid #e8e8e8;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>植物大战僵尸融合版 Mod 管理器</h1>

    <!-- 第一行：游戏目录和版本选择 -->
    <div class="row">
        <label>游戏目录：</label>
        <select id="gamePathSelect" onchange="onGamePathChange()">
            <option value="">请选择...</option>
        </select>
        <button class="btn-default" onclick="addGamePath()">添加</button>
        <label style="min-width: 50px;">版本：</label>
        <select id="versionSelect" onchange="onVersionChange()">
            <option value="">请选择...</option>
        </select>
    </div>

    <!-- 第二行：MOD 目录选择 -->
    <div class="row">
        <label>MOD目录：</label>
        <select id="modPathSelect" onchange="onModPathChange()">
            <option value="">请选择...</option>
        </select>
        <button class="btn-default" onclick="addModPath()">添加</button>
    </div>

    <!-- 第三行：BepInEx 检测 -->
    <div class="row">
        <label>BepInEx：</label>
        <span id="bepStatus" class="status-tag status-not-installed">检测中...</span>
        <button id="installBepBtn" class="btn-success" onclick="installBepInEx()" style="display:none;">安装 BepInEx
        </button>
        <button id="removeBepBtn" class="btn-danger" onclick="removeBepInEx()" style="display:none;">卸载 BepInEx
        </button>
    </div>

    <!-- 第四行：修改器安装 -->
    <div class="row">
        <label>修改器：</label>
        <button class="btn-disabled" disabled title="功能开发中">安装高数修改器</button>
        <button class="btn-disabled" disabled title="功能开发中">安装梧萱修改器</button>
    </div>

    <!-- 第五行：打开目录 -->
    <div class="row">
        <label>快捷操作：</label>
        <button class="btn-default" onclick="openFolder('game')">打开游戏目录</button>
        <button class="btn-default" onclick="openFolder('mod')">打开MOD目录</button>
        <button class="btn-default" onclick="openFolder('installed')">打开已安装MOD目录</button>
    </div>

    <!-- 搜索框 -->
    <div class="row">
        <label>搜索：</label>
        <input type="text" class="search-input" id="searchInput" placeholder="输入中文名称关键字..."
               oninput="onSearch()">
        <button class="btn-default" onclick="clearSearch()">清除</button>
        <button class="btn-primary" onclick="refreshAll()">刷新列表</button>
    </div>

    <!-- 第六行：植物 MOD -->
    <div class="mod-section">
        <div class="mod-section-title">🌱 植物 MOD</div>
        <div class="mod-split">
            <div class="mod-half">
                <div class="mod-half-header">未安装</div>
                <div class="mod-half-content" id="plantNotInstalled"></div>
            </div>
            <div class="mod-half">
                <div class="mod-half-header">已安装</div>
                <div class="mod-half-content" id="plantInstalled"></div>
            </div>
        </div>
    </div>

    <!-- 第七行：僵尸 MOD -->
    <div class="mod-section">
        <div class="mod-section-title">🧟 僵尸 MOD</div>
        <div class="mod-split">
            <div class="mod-half">
                <div class="mod-half-header">未安装</div>
                <div class="mod-half-content" id="zombieNotInstalled"></div>
            </div>
            <div class="mod-half">
                <div class="mod-half-header">已安装</div>
                <div class="mod-half-content" id="zombieInstalled"></div>
            </div>
        </div>
    </div>

    <!-- 第八行：皮肤 -->
    <div class="mod-section">
        <div class="mod-section-title">🎨 皮肤</div>
        <div class="mod-split">
            <div class="mod-half">
                <div class="mod-half-header">未安装</div>
                <div class="mod-half-content" id="skinNotInstalled"></div>
            </div>
            <div class="mod-half">
                <div class="mod-half-header">已安装</div>
                <div class="mod-half-content" id="skinInstalled"></div>
            </div>
        </div>
    </div>

    <!-- 第九行：在线 MOD -->
    <div class="mod-section">
        <div class="mod-section-title">🌐 在线 MOD</div>
        <div style="padding: 16px; text-align: center; color: #999;">
            <button class="btn-disabled" disabled title="功能开发中">在线 MOD（功能开发中）</button>
        </div>
    </div>
</div>

<script>
    let currentConfig = null;
    let currentKeyword = '';
    let allModData = {
        plantMods: {installed: [], not_installed: []},
        zombieMods: {installed: [], not_installed: []},
        skins: {installed: [], not_installed: []}
    };

    // 页面初始化
    window.addEventListener('DOMContentLoaded', () => {
        loadConfig();
    });

    // 加载配置
    function loadConfig() {
        fetch('/api/config')
            .then(res => res.json())
            .then(cfg => {
                currentConfig = cfg;
                updateGamePathSelect(cfg.game_paths || []);
                updateModPathSelect(cfg.mod_paths || []);
                updateVersionSelect(cfg.versions || []);

                if (cfg.current_game) {
                    document.getElementById('gamePathSelect').value = cfg.current_game;
                    checkBepInEx();
                    loadMods();
                }
                if (cfg.current_version) {
                    document.getElementById('versionSelect').value = cfg.current_version;
                }
                if (cfg.current_modlib) {
                    document.getElementById('modPathSelect').value = cfg.current_modlib;
                }
            })
            .catch(err => console.error('加载配置失败:', err));
    }

    // 更新游戏目录下拉框
    function updateGamePathSelect(paths) {
        const select = document.getElementById('gamePathSelect');
        select.innerHTML = '<option value="">请选择...</option>';
        paths.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.path;
            opt.textContent = `${p.path} (${p.version || '未知版本'})`;
            select.appendChild(opt);
        });
    }

    // 更新 MOD 目录下拉框
    function updateModPathSelect(paths) {
        const select = document.getElementById('modPathSelect');
        select.innerHTML = '<option value="">请选择...</option>';
        paths.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            select.appendChild(opt);
        });
    }

    // 更新版本下拉框
    function updateVersionSelect(versions) {
        const select = document.getElementById('versionSelect');
        select.innerHTML = '<option value="">请选择...</option>';
        versions.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v;
            opt.textContent = v;
            select.appendChild(opt);
        });
    }

    // 游戏目录切换
    function onGamePathChange() {
        const path = document.getElementById('gamePathSelect').value;
        if (!path) return;

        fetch('/api/switch-game', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({path: path})
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('切换失败: ' + data.error);
                } else {
                    checkBepInEx();
                    loadMods();
                }
            })
            .catch(err => alert('切换失败: ' + err.message));
    }

    // 版本切换
    function onVersionChange() {
        const version = document.getElementById('versionSelect').value;
        if (!version) return;

        fetch('/api/switch-version', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({version: version})
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('切换失败: ' + data.error);
                } else {
                    document.getElementById('gamePathSelect').value = data.game_path;
                    checkBepInEx();
                    loadMods();
                }
            })
            .catch(err => alert('切换失败: ' + err.message));
    }

    // MOD 目录切换
    function onModPathChange() {
        fetch('/api/add-mod-path', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.path) {
                    loadConfig();
                }
            })
            .catch(err => alert('添加失败: ' + err.message));
    }

    // 添加游戏目录
    function addGamePath() {
        fetch('/api/add-game-path', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.path) {
                    loadConfig();
                }
            })
            .catch(err => alert('添加失败: ' + err.message));
    }

    // 添加 MOD 目录
    function addModPath() {
        fetch('/api/add-mod-path', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.path) {
                    loadConfig();
                }
            })
            .catch(err => alert('添加失败: ' + err.message));
    }

    // 检查 BepInEx 状态
    function checkBepInEx() {
        fetch('/api/check-bepinex')
            .then(res => res.json())
            .then(data => {
                const statusEl = document.getElementById('bepStatus');
                const installBtn = document.getElementById('installBepBtn');
                const removeBtn = document.getElementById('removeBepBtn');

                if (data.installed) {
                    statusEl.textContent = '已安装';
                    statusEl.className = 'status-tag status-installed';
                    installBtn.style.display = 'none';
                    removeBtn.style.display = 'inline-block';
                } else {
                    statusEl.textContent = '未安装';
                    statusEl.className = 'status-tag status-not-installed';
                    installBtn.style.display = 'inline-block';
                    removeBtn.style.display = 'none';
                }
            })
            .catch(err => console.error('检查 BepInEx 失败:', err));
    }

    // 安装 BepInEx
    function installBepInEx() {
        if (!confirm('确定要安装 BepInEx 吗？')) return;

        const btn = document.getElementById('installBepBtn');
        btn.disabled = true;
        btn.textContent = '安装中...';

        fetch('/api/install-bepinex', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('安装失败: ' + data.error);
                } else {
                    alert('BepInEx 安装完成！');
                    checkBepInEx();
                    loadMods();
                }
            })
            .catch(err => alert('安装失败: ' + err.message))
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '安装 BepInEx';
            });
    }

    // 卸载 BepInEx
    function removeBepInEx() {
        if (!confirm('确定要卸载 BepInEx 吗？\n这将删除 BepInEx 相关文件，但保留游戏原始文件。')) return;

        const btn = document.getElementById('removeBepBtn');
        btn.disabled = true;
        btn.textContent = '卸载中...';

        fetch('/api/remove-bepinex', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('卸载失败: ' + data.error);
                } else {
                    alert('BepInEx 已卸载！');
                    checkBepInEx();
                    loadMods();
                }
            })
            .catch(err => alert('卸载失败: ' + err.message))
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '卸载 BepInEx';
            });
    }

    // 打开目录
    function openFolder(type) {
        if (type === 'installed') {
            // 打开已安装MOD目录前，先检查 BepInEx 是否已安装
            fetch('/api/check-bepinex')
                .then(res => res.json())
                .then(data => {
                    if (!data.installed) {
                        alert('BepInEx 未安装，无法打开已安装MOD目录。\n请先安装 BepInEx。');
                        return;
                    }
                    doOpenFolder(type);
                })
                .catch(err => alert('检查 BepInEx 失败: ' + err.message));
            return;
        }
        doOpenFolder(type);
    }

    function doOpenFolder(type) {
        fetch(`/api/open-folder`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({type: type})
        })
            .catch(err => alert('打开目录失败: ' + err.message));
    }

    // 刷新所有列表
    function refreshAll() {
        loadConfig();
        loadMods();
    }

    // 搜索
    function onSearch() {
        currentKeyword = document.getElementById('searchInput').value;
        renderAllMods();
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        currentKeyword = '';
        renderAllMods();
    }

    // 加载 MOD 列表
    function loadMods() {
        fetch('/api/mods')
            .then(res => res.json())
            .then(data => {
                allModData = {
                    plantMods: data.plant_mods || {installed: [], not_installed: []},
                    zombieMods: data.zombie_mods || {installed: [], not_installed: []},
                    skins: data.skins || {installed: [], not_installed: []}
                };
                renderAllMods();
            })
            .catch(err => console.error('加载 MOD 列表失败:', err));
    }

    // 渲染所有 MOD 列表
    function renderAllMods() {
        const keyword = currentKeyword.trim().toLowerCase();
        const match = (text) => !keyword || (text && text.toLowerCase().includes(keyword));

        renderModList('plantNotInstalled', allModData.plantMods.not_installed.filter(m => match(m.name)), false);
        renderModList('plantInstalled', allModData.plantMods.installed.filter(m => match(m.chinese_name)), true);
        renderModList('zombieNotInstalled', allModData.zombieMods.not_installed.filter(m => match(m.name)), false);
        renderModList('zombieInstalled', allModData.zombieMods.installed.filter(m => match(m.chinese_name)), true);
        renderModList('skinNotInstalled', allModData.skins.not_installed.filter(m => match(m.name)), false);
        renderModList('skinInstalled', allModData.skins.installed.filter(m => match(m.chinese_name)), true);
    }

    // 渲染 MOD 列表
    function renderModList(containerId, mods, isInstalled) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';

        if (!mods || mods.length === 0) {
            container.innerHTML = '<div class="mod-item"><span class="mod-name" style="color:#999;">无</span></div>';
            return;
        }

        mods.forEach(mod => {
            const div = document.createElement('div');
            div.className = 'mod-item';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'mod-name';

            if (isInstalled) {
                const statusIcon = mod.enabled !== false ? '✅' : '⏸️';
                nameSpan.textContent = `${statusIcon} ${mod.chinese_name}`;
                if (mod.dll_names && mod.dll_names.length > 0) {
                    const small = document.createElement('small');
                    small.textContent = ` (${mod.dll_names.join(', ')})`;
                    nameSpan.appendChild(small);
                }
            } else {
                nameSpan.textContent = mod.name;
                if (mod.dll_names && mod.dll_names.length > 0) {
                    const small = document.createElement('small');
                    small.textContent = ` (${mod.dll_names.join(', ')})`;
                    nameSpan.appendChild(small);
                }
            }

            div.appendChild(nameSpan);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'mod-actions';

            if (isInstalled) {
                // 已安装：显示移除按钮
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '移除';
                removeBtn.className = 'btn-danger';
                removeBtn.style.padding = '4px 8px';
                removeBtn.style.fontSize = '12px';
                removeBtn.onclick = () => removeMod(mod.chinese_name);
                actionsDiv.appendChild(removeBtn);
            } else {
                // 未安装：显示安装按钮
                const installBtn = document.createElement('button');
                installBtn.textContent = '安装';
                installBtn.className = 'btn-success';
                installBtn.style.padding = '4px 8px';
                installBtn.style.fontSize = '12px';
                installBtn.onclick = () => installMod(mod.name);
                actionsDiv.appendChild(installBtn);
            }

            div.appendChild(actionsDiv);
            container.appendChild(div);
        });
    }

    // 安装 MOD
    function installMod(name) {
        fetch('/api/install-mod', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name})
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('安装失败: ' + data.error);
                } else {
                    loadMods();
                }
            })
            .catch(err => alert('安装失败: ' + err.message));
    }

    // 移除 MOD
    function removeMod(name) {
        if (!confirm(`确定要移除 "${name}" 吗？`)) return;

        fetch('/api/remove-mod-by-name', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name})
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('移除失败: ' + data.error);
                } else {
                    loadMods();
                }
            })
            .catch(err => alert('移除失败: ' + err.message));
    }
</script>
</body>
</html>
