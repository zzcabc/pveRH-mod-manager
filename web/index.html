<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物大战僵尸融合版 Mod 管理器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; padding: 20px; }
        .container { width: 100%; max-width: 1300px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .toolbar { margin-bottom: 20px; }
        .path-row { display: flex; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .path-row label { width: 100px; font-weight: bold; }
        .path-row input { flex: 1; padding: 6px; border: 1px solid #d9d9d9; border-radius: 4px; background: #fafafa; min-width: 200px; }
        .path-row button, .path-row select { margin-left: 10px; padding: 6px 16px; background: #1677ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
        .path-row select { background: #fff; color: #333; border: 1px solid #d9d9d9; }
        .bep-row { display: flex; align-items: center; margin-top: 6px; gap: 12px; flex-wrap: wrap; }
        .section { margin-bottom: 16px; }
        .section-title { font-size: 16px; font-weight: bold; padding: 8px 12px; background: #f0f2f5; border-radius: 4px 4px 0 0; }
        .split-panel { display: flex; gap: 8px; border: 1px solid #e8e8e8; border-radius: 0 0 4px 4px; overflow: hidden; min-height: 160px; max-height: 360px; }
        .half { flex: 1; display: flex; flex-direction: column; overflow: auto; }
        .half-header { padding: 6px 10px; background: #fafafa; font-size: 14px; font-weight: bold; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 1; }
        .half-content { padding: 6px 8px; flex: 1; }
        .mod-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f0f0f0; gap: 8px; }
        .mod-item:last-child { border-bottom: none; }
        .mod-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .mod-item button { padding: 3px 10px; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; white-space: nowrap; }
        .install-btn { background: #52c41a; color: #fff; }
        .uninstall-btn { background: #ff4d4f; color: #fff; }
        .unzip-btn { background: #faad14; color: #fff; }
        .format-btn { background: #722ed1; color: #fff; }
        .refresh-btn { background: #1677ff; color: #fff; }
        .enable-btn { background: #52c41a; color: #fff; }
        .disable-btn { background: #ff7a45; color: #fff; }
        .deploy-btn { background: #722ed1; color: #fff; }
        .status { color: #888; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-group { display: flex; gap: 4px; flex-wrap: nowrap; align-items: center; }
        small { font-size: 0.75em; color: #666; }
        .zips-panel, .online-panel, .trainer-panel { margin-top: 8px; }
        .zips-panel .panel, .online-panel .panel, .trainer-panel .panel { border: 1px solid #e8e8e8; border-radius: 4px; overflow: auto; max-height: 200px; }
        .zips-panel h3, .online-panel h3, .trainer-panel h3 { background: #fafafa; padding: 8px 12px; border-bottom: 1px solid #e8e8e8; position: sticky: 0; }
        .zips-content, .online-content, .trainer-content { padding: 6px 10px; }

        /* 已禁用 Mod 样式 */
        .mod-item.disabled { opacity: 0.6; background: #fff7e6; }
        .mod-item.disabled span { text-decoration: line-through; color: #999; }

        /* 批量操作按钮 */
        .batch-actions { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
        .batch-actions button { padding: 4px 12px; font-size: 13px; }

        @media screen and (max-width: 750px) {
            .split-panel { flex-direction: column; max-height: none; }
            .half { max-height: 200px; }
            .path-row { flex-direction: column; align-items: flex-start; }
            .path-row label { width: auto; margin-bottom: 4px; }
            .path-row button, .path-row select { margin-left: 0; margin-top: 8px; }
        }
        .section .split-panel { /* 已存在，保持 */ }
        .online-panel, .trainer-panel, .zips-panel {
            /* 让这些面板也遵循 section 布局 */
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="toolbar">
        <div class="path-row">
            <label>游戏目录:</label>
            <input type="text" id="gamePath" readonly placeholder="请点击右侧选择...">
            <button id="selectGameBtn" onclick="selectFolder('game')">选择</button>
        </div>
        <div class="path-row">
            <label>Mod 库:</label>
            <input type="text" id="modLibPath" readonly placeholder="请点击右侧选择...">
            <button id="selectModLibBtn" onclick="selectFolder('modlib')">选择</button>
        </div>
        <div class="path-row">
            <label>下载目录:</label>
            <input type="text" id="downloadPath" readonly placeholder="请点击右侧选择...">
            <button id="selectDownloadBtn" onclick="selectFolder('download')">选择</button>
        </div>
        <div class="path-row">
            <label>搜索 Mod:</label>
            <input type="text" id="searchInput" placeholder="输入中文名称关键字..." oninput="onSearch()" style="flex:1; padding:6px;">
            <button onclick="clearSearch()">清除</button>
        </div>
        <div class="bep-row">
            <span id="bepStatus">BepInEx: 未检测</span>
            <button id="installBepBtn" onclick="installBepInEx()" style="display:none;">安装 BepInEx</button>
            <button id="removeBepBtn" onclick="removeBepInEx()" style="display:none;">移除 BepInEx</button>
            <button id="refreshModsBtn" class="refresh-btn" onclick="refreshMods()">刷新列表</button>
            <button id="formatAllBtn" class="refresh-btn" onclick="formatAll()">一键格式化</button>
            <button id="unzipAllBtn" class="unzip-btn" onclick="unzipAll()">一键解压</button>
            <button id="deployAllBtn" class="deploy-btn" onclick="deployAll()">重新部署</button>
        </div>
    </div>

    <!-- 植物 Mod -->
    <div class="section">
        <div class="section-title">🌱 植物 Mod</div>
        <div class="split-panel">
            <div class="half">
                <div class="half-header">未安装</div>
                <div class="half-content" id="plantAvailable"></div>
            </div>
            <div class="half">
                <div class="half-header">已安装</div>
                <div class="half-content" id="plantInstalled"></div>
            </div>
        </div>
    </div>

    <!-- 僵尸 Mod -->
    <div class="section">
        <div class="section-title">🧟 僵尸 Mod</div>
        <div class="split-panel">
            <div class="half">
                <div class="half-header">未安装</div>
                <div class="half-content" id="zombieAvailable"></div>
            </div>
            <div class="half">
                <div class="half-header">已安装</div>
                <div class="half-content" id="zombieInstalled"></div>
            </div>
        </div>
    </div>

    <!-- 皮肤 -->
    <div class="section">
        <div class="section-title">🎨 皮肤</div>
        <div class="split-panel">
            <div class="half">
                <div class="half-header">未安装</div>
                <div class="half-content" id="skinAvailable"></div>
            </div>
            <div class="half">
                <div class="half-header">已安装</div>
                <div class="half-content" id="skinInstalled"></div>
            </div>
        </div>
    </div>

    <!-- 修改器 -->
    <div class="trainer-panel">
        <div class="panel">
            <h3>🔧 修改器</h3>
            <div class="trainer-content" id="trainerList"></div>
        </div>
    </div>

    <!-- 在线 Mod -->
    <div class="section">
        <div class="section-title">🌐 在线 Mod</div>
        <div style="padding: 8px 12px; display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #e8e8e8; border-top: none;">
            <label>游戏版本:</label>
            <select id="gameVersionSelect" onchange="onGameVersionChange()" style="padding:4px;">
                <option value="">请选择...</option>
            </select>
            <button onclick="refreshVersions()" class="refresh-btn" style="padding:4px 12px;">刷新版本</button>
        </div>
        <div class="split-panel" style="max-height: 360px; min-height: 160px;">
            <div class="half" style="flex: 1;">
                <div class="half-header">在线 Mod 列表</div>
                <div class="half-content" id="onlineModList"></div>
            </div>
        </div>
    </div>

    <!-- 可解压 ZIP -->
    <div class="zips-panel">
        <div class="panel">
            <h3>📦 可解压 ZIP</h3>
            <div class="zips-content" id="zipList"></div>
        </div>
    </div>
</div>

<script>
    const locks = new WeakMap();
    let allData = {
        plantInstalled: [],
        plantAvailable: [],
        zombieInstalled: [],
        zombieAvailable: [],
        skinInstalled: [],
        skinAvailable: []
    };
    let currentKeyword = '';

    // 页面初始化
    window.addEventListener('DOMContentLoaded', () => {
        fetch('/api/config')
            .then(res => res.json())
            .then(cfg => {
                if (cfg.game_path) document.getElementById('gamePath').value = cfg.game_path;
                if (cfg.modlib_path) document.getElementById('modLibPath').value = cfg.modlib_path;
                if (cfg.download_path) document.getElementById('downloadPath').value = cfg.download_path;
                if (cfg.game_path) checkBepInExAndLoadAll();
            })
            .catch(err => console.error('加载配置失败:', err));
        loadGameVersions();
    });

    function selectFolder(type) {
        const btnId = type === 'game' ? 'selectGameBtn' : 'selectDownloadBtn';
        const btn = document.getElementById(btnId);
        if (locks.get(btn)) return;
        locks.set(btn, true);
        btn.disabled = true;
        btn.textContent = '...';
        fetch(`/api/select-${type}`)
            .then(res => res.json())
            .then(data => {
                if (data && data.path) {
                    if (type === 'game') {
                        document.getElementById('gamePath').value = data.path;
                        checkBepInExAndLoadAll();
                    } else {
                        document.getElementById('downloadPath').value = data.path;
                    }
                }
            })
            .catch(err => alert('选择失败: ' + err.message))
            .finally(() => { locks.set(btn, false); btn.disabled = false; btn.textContent = '选择'; });
    }

    function checkBepInExOnly() {
        fetch('/api/check-bepinex')
            .then(res => res.json())
            .then(data => {
                const el = document.getElementById('bepStatus');
                const installBtn = document.getElementById('installBepBtn');
                const removeBtn = document.getElementById('removeBepBtn');
                if (data.installed) {
                    el.textContent = 'BepInEx: ✅ 已安装';
                    installBtn.style.display = 'none';
                    removeBtn.style.display = 'inline-block';
                } else {
                    el.textContent = 'BepInEx: ⚠️ 未安装';
                    installBtn.style.display = 'inline-block';
                    removeBtn.style.display = 'none';
                }
            });
    }

    function checkBepInExAndLoadAll() {
        const gamePath = document.getElementById('gamePath').value;
        if (!gamePath) return;
        fetch('/api/check-bepinex')
            .then(res => res.json())
            .then(data => {
                const el = document.getElementById('bepStatus');
                const installBtn = document.getElementById('installBepBtn');
                const removeBtn = document.getElementById('removeBepBtn');
                if (data.installed) {
                    el.textContent = 'BepInEx: ✅ 已安装';
                    installBtn.style.display = 'none';
                    removeBtn.style.display = 'inline-block';
                } else {
                    el.textContent = 'BepInEx: ⚠️ 未安装';
                    installBtn.style.display = 'inline-block';
                    removeBtn.style.display = 'none';
                }
                if (gamePath) { loadMods(); loadSkins(); loadTrainers(); loadOnlineModsIfVersionSelected(); }
            });
    }

    function installBepInEx() {
        const btn = document.getElementById('installBepBtn');
        if (locks.get(btn)) return;
        locks.set(btn, true);
        btn.disabled = true;
        btn.textContent = '安装中...';
        fetch('/api/install-bepinex', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert(data.error);
                else { alert('BepInEx 安装完成！'); checkBepInExAndLoadAll(); }
            })
            .finally(() => { locks.set(btn, false); btn.disabled = false; btn.textContent = '安装 BepInEx'; });
    }

    function removeBepInEx() {
        if (!confirm('确定要移除 BepInEx 吗？\n这将删除 BepInEx 相关文件，但保留游戏原始文件。')) return;
        const btn = document.getElementById('removeBepBtn');
        if (locks.get(btn)) return;
        locks.set(btn, true);
        btn.disabled = true;
        btn.textContent = '移除中...';
        fetch('/api/remove-bepinex', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert('移除失败: ' + data.error);
                else { alert('BepInEx 已移除！'); checkBepInExAndLoadAll(); }
            })
            .catch(err => alert('请求失败: ' + err.message))
            .finally(() => { locks.set(btn, false); btn.disabled = false; btn.textContent = '移除 BepInEx'; });
    }

    function refreshMods() {
        if (!document.getElementById('gamePath').value) {
            alert('请先选择游戏目录'); return;
        }
        loadMods(); loadSkins(); loadTrainers(); loadOnlineModsIfVersionSelected();
    }

    // ---------- 批量操作 ----------
    function formatAll() {
        if (!confirm('确定要格式化所有未安装的 Mod 文件夹吗？')) return;
        fetch('/api/format-all', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert('格式化失败: ' + data.error);
                else { alert('全部格式化完成！'); loadMods(); }
            })
            .catch(err => alert('请求失败: ' + err.message));
    }

    function unzipAll() {
        if (!confirm('确定要解压所有 ZIP 文件吗？')) return;
        fetch('/api/unzip-all', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert('解压失败: ' + data.error);
                else { alert('全部解压完成！'); loadMods(); }
            })
            .catch(err => alert('请求失败: ' + err.message));
    }

    function deployAll() {
        if (!confirm('确定要重新部署所有已启用的 Mod 吗？\n这将清空 plugins 目录并重新复制所有已启用的 Mod。')) return;
        const btn = document.getElementById('deployAllBtn');
        if (locks.get(btn)) return;
        locks.set(btn, true);
        btn.disabled = true;
        btn.textContent = '部署中...';
        fetch('/api/deploy-all', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert('部署失败: ' + data.error);
                else { alert('部署完成！'); loadMods(); }
            })
            .catch(err => alert('请求失败: ' + err.message))
            .finally(() => { locks.set(btn, false); btn.disabled = false; btn.textContent = '重新部署'; });
    }

    // ---------- Mod 列表 ----------
    function loadMods() {
        fetch('/api/mods')
            .then(res => res.json())
            .then(data => {
                allData.plantInstalled = data.installed_plant || [];
                allData.plantAvailable = data.not_installed_plant || [];
                allData.zombieInstalled = data.installed_zombie || [];
                allData.zombieAvailable = data.not_installed_zombie || [];
                renderZips(data.zips);
                applyFilter();
            })
            .catch(err => console.error(err));
    }

    function loadSkins() {
        fetch('/api/skins')
            .then(res => res.json())
            .then(data => {
                allData.skinInstalled = (data.installed || []).map(name => ({chinese_name: name, dll_names: []}));
                allData.skinAvailable = (data.not_installed || []).map(name => ({name: name, dll_names: [], needs_format: false}));
                applyFilter();
            })
            .catch(err => console.error(err));
    }

    function loadTrainers() {
        fetch('/api/trainers')
            .then(res => res.json())
            .then(data => renderTrainers(data.trainers))
            .catch(err => console.error(err));
    }

    // 过滤并渲染所有
    function applyFilter() {
        const keyword = currentKeyword.trim().toLowerCase();
        const match = (text) => text && text.toLowerCase().includes(keyword);

        renderAvailableMods(allData.plantAvailable.filter(m => match(m.name)), 'plantAvailable');
        renderInstalledMods(allData.plantInstalled.filter(m => match(m.chinese_name)), 'plantInstalled');
        renderAvailableMods(allData.zombieAvailable.filter(m => match(m.name)), 'zombieAvailable');
        renderInstalledMods(allData.zombieInstalled.filter(m => match(m.chinese_name)), 'zombieInstalled');
        renderSkinList('skinAvailable', allData.skinAvailable.filter(m => match(m.name)), true);
        renderSkinList('skinInstalled', allData.skinInstalled.filter(m => match(m.chinese_name)), false);
    }

    function onSearch() {
        currentKeyword = document.getElementById('searchInput').value;
        applyFilter();
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        currentKeyword = '';
        applyFilter();
    }

    function renderAvailableMods(mods, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (!mods || mods.length === 0) {
            container.innerHTML = '<div class="mod-item status">无</div>'; return;
        }
        mods.forEach(m => {
            const div = document.createElement('div');
            div.className = 'mod-item';
            const dllList = m.dll_names.join(', ');
            div.innerHTML = `<span title="${escapeHtml(m.name)}">${escapeHtml(m.name)} <small>(${escapeHtml(dllList)})</small></span>`;
            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            const installBtn = document.createElement('button');
            installBtn.textContent = '安装并启用';
            installBtn.className = 'install-btn';
            installBtn.onclick = () => enableMod(m.name);
            btnGroup.appendChild(installBtn);

            if (m.needs_format) {
                const formatBtn = document.createElement('button');
                formatBtn.textContent = '格式化';
                formatBtn.className = 'format-btn';
                formatBtn.onclick = () => formatMod(m.name);
                btnGroup.appendChild(formatBtn);
            }

            div.appendChild(btnGroup);
            container.appendChild(div);
        });
    }

    function renderInstalledMods(mods, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (!mods || mods.length === 0) {
            container.innerHTML = '<div class="mod-item status">无</div>'; return;
        }
        mods.forEach(m => {
            const div = document.createElement('div');
            const isEnabled = m.enabled !== false; // 默认启用
            div.className = 'mod-item' + (isEnabled ? '' : ' disabled');
            const dllList = m.dll_names.join(', ');
            const statusIcon = isEnabled ? '✅' : '⏸️';
            div.innerHTML = `<span title="${escapeHtml(m.chinese_name)}">${statusIcon} ${escapeHtml(m.chinese_name)} <small>(${escapeHtml(dllList)})</small></span>`;
            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            if (isEnabled) {
                const disableBtn = document.createElement('button');
                disableBtn.textContent = '禁用';
                disableBtn.className = 'disable-btn';
                disableBtn.onclick = () => disableMod(m.chinese_name);
                btnGroup.appendChild(disableBtn);
            } else {
                const enableBtn = document.createElement('button');
                enableBtn.textContent = '启用';
                enableBtn.className = 'enable-btn';
                enableBtn.onclick = () => enableMod(m.chinese_name);
                btnGroup.appendChild(enableBtn);
            }

            const uninstallBtn = document.createElement('button');
            uninstallBtn.textContent = '卸载';
            uninstallBtn.className = 'uninstall-btn';
            uninstallBtn.onclick = () => modAction('uninstall', m.chinese_name);
            btnGroup.appendChild(uninstallBtn);

            div.appendChild(btnGroup);
            container.appendChild(div);
        });
    }

    function renderSkinList(containerId, skins, isInstall) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (!skins || skins.length === 0) {
            container.innerHTML = '<div class="mod-item status">无</div>'; return;
        }
        skins.forEach(item => {
            const div = document.createElement('div');
            div.className = 'mod-item';
            const displayName = isInstall ? item.name : item.chinese_name;
            div.innerHTML = `<span title="${escapeHtml(displayName)}">${escapeHtml(displayName)}</span>`;
            const btn = document.createElement('button');
            if (isInstall) {
                btn.textContent = '安装';
                btn.className = 'install-btn';
                btn.onclick = () => skinAction('install', item.name);
            } else {
                btn.textContent = '卸载';
                btn.className = 'uninstall-btn';
                btn.onclick = () => skinAction('uninstall', item.chinese_name);
            }
            div.appendChild(btn);
            container.appendChild(div);
        });
    }

    function renderTrainers(trainers) {
        const container = document.getElementById('trainerList');
        container.innerHTML = '';
        if (!trainers || trainers.length === 0) {
            container.innerHTML = '<div class="mod-item status">无</div>'; return;
        }
        trainers.forEach(t => {
            const div = document.createElement('div');
            div.className = 'mod-item';
            div.innerHTML = `<span>${escapeHtml(t.Name)}</span>`;
            const btn = document.createElement('button');
            btn.textContent = '安装';
            btn.className = 'install-btn';
            btn.onclick = () => installTrainer(t.Name);
            div.appendChild(btn);
            container.appendChild(div);
        });
    }

    function renderZips(zips) {
        const container = document.getElementById('zipList');
        container.innerHTML = '';
        if (!zips || zips.length === 0) {
            container.innerHTML = '<div class="mod-item status">无</div>'; return;
        }
        zips.forEach(z => {
            const div = document.createElement('div');
            div.className = 'mod-item';
            div.innerHTML = `<span>${escapeHtml(z.name)}.zip</span>`;
            const btn = document.createElement('button');
            btn.textContent = '解压';
            btn.className = 'unzip-btn';
            btn.onclick = () => unzipMod(z.name);
            div.appendChild(btn);
            container.appendChild(div);
        });
    }

    // ---------- Mod 状态管理 ----------
    function enableMod(name) {
        fetch('/api/enable-mod', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert('启用失败: ' + data.error);
                else loadMods();
            })
            .catch(err => alert('操作失败: ' + err.message));
    }

    function disableMod(name) {
        fetch('/api/disable-mod', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert('禁用失败: ' + data.error);
                else loadMods();
            })
            .catch(err => alert('操作失败: ' + err.message));
    }

    function modAction(action, name) {
        fetch(`/api/${action}-mod`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        })
            .then(res => res.json())
            .then(data => { if (data.error) alert(data.error); else loadMods(); })
            .catch(err => alert('操作失败: ' + err.message));
    }

    function skinAction(action, name) {
        fetch(`/api/${action}-skin`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        })
            .then(res => res.json())
            .then(data => { if (data.error) alert(data.error); else loadSkins(); })
            .catch(err => alert('操作失败: ' + err.message));
    }

    function unzipMod(name) {
        fetch('/api/unzip-mod', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        })
            .then(res => res.json())
            .then(data => { if (data.error) alert(data.error); else { alert('解压完成！'); loadMods(); } })
            .catch(err => alert('请求失败: ' + err.message));
    }

    function formatMod(name) {
        fetch('/api/format-mod', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        })
            .then(res => res.json())
            .then(data => { if (data.error) alert('格式化失败: ' + data.error); else { alert('格式化完成！'); loadMods(); } })
            .catch(err => alert('请求失败: ' + err.message));
    }

    function installTrainer(name) {
        fetch('/api/install-trainer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        })
            .then(res => res.json())
            .then(data => { if (data.error) alert('安装失败: ' + data.error); else alert('修改器安装完成！'); })
            .catch(err => alert('请求失败: ' + err.message));
    }

    // ---------- 在线 Mod ----------
    function loadGameVersions() {
        fetch('/api/game-versions')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('gameVersionSelect');
                const current = select.value;
                select.innerHTML = '<option value="">请选择...</option>';
                (data.versions || []).forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v; opt.textContent = v;
                    select.appendChild(opt);
                });
                if (current) select.value = current;
                if (select.value) loadOnlineMods(select.value);
                else document.getElementById('onlineModList').innerHTML = '<div class="mod-item status">请选择游戏版本</div>';
            })
            .catch(err => console.error(err));
    }

    function onGameVersionChange() {
        const ver = document.getElementById('gameVersionSelect').value;
        if (ver) loadOnlineMods(ver);
        else document.getElementById('onlineModList').innerHTML = '<div class="mod-item status">请选择游戏版本</div>';
    }

    function loadOnlineModsIfVersionSelected() {
        const ver = document.getElementById('gameVersionSelect').value;
        if (ver) loadOnlineMods(ver);
    }

    function loadOnlineMods(ver) {
        fetch(`/api/online-mods?ver=${encodeURIComponent(ver)}`)
            .then(res => res.json())
            .then(data => renderOnlineMods(data.mods))
            .catch(err => {
                console.error(err);
                document.getElementById('onlineModList').innerHTML = '<div class="mod-item status">加载失败</div>';
            });
    }

    function renderOnlineMods(mods) {
        const container = document.getElementById('onlineModList');
        container.innerHTML = '';
        if (!mods || mods.length === 0) {
            container.innerHTML = '<div class="mod-item status">无在线 Mod</div>'; return;
        }
        mods.forEach(mod => {
            const div = document.createElement('div');
            div.className = 'mod-item';
            div.innerHTML = `<span>${escapeHtml(mod.name_cn)} (${escapeHtml(mod.file_name)}) <small>作者:${escapeHtml(mod.author)} 版本:${escapeHtml(mod.game_ver)}</small></span>`;
            const btn = document.createElement('button');
            btn.textContent = '下载';
            btn.className = 'install-btn';
            btn.onclick = () => downloadMod(mod);
            div.appendChild(btn);
            container.appendChild(div);
        });
    }

    function downloadMod(mod) {
        fetch('/api/download-mod', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(mod)
        })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert('下载失败: ' + data.error);
                else { alert('下载成功！'); loadMods(); }
            })
            .catch(err => alert('请求失败: ' + err.message));
    }

    function refreshVersions() {
        loadGameVersions();
    }

    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, m => map[m]);
    }
</script>
</body>
</html>
